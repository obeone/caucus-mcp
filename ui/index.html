<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WAR ROOM // operator console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e12;
    --panel: #11171d;
    --panel-2: #161e26;
    --line: #233039;
    --ink: #c9d6de;
    --dim: #6b7d89;
    --amber: #ffb22e;
    --green: #4fd67a;
    --red: #ff4d5e;
    --cyan: #38c6d9;
    --human: #c08bff;
    --grain: rgba(255, 255, 255, 0.012);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Mono", monospace;
    font-size: 14px;
  }

  body {
    background-image:
      repeating-linear-gradient(0deg, var(--grain) 0 1px, transparent 1px 3px),
      radial-gradient(120% 80% at 50% -10%, rgba(56, 198, 217, 0.07), transparent 60%);
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  header {
    display: flex; align-items: center; gap: 18px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
  }

  .brand {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 4px;
    font-size: 18px; color: var(--ink);
  }
  .brand b { color: var(--amber); }

  .mode-badge {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 3px;
    padding: 5px 14px; border-radius: 2px;
    border: 1px solid var(--line);
    text-transform: uppercase;
  }
  .mode-running { color: var(--green); border-color: var(--green); box-shadow: 0 0 16px -6px var(--green); }
  .mode-paused  { color: var(--amber); border-color: var(--amber); box-shadow: 0 0 16px -6px var(--amber); animation: blink 1.1s steps(2) infinite; }
  .mode-stopped { color: var(--red); border-color: var(--red); box-shadow: 0 0 16px -6px var(--red); }
  @keyframes blink { 50% { opacity: 0.35; } }

  .spacer { flex: 1; }

  .controls { display: flex; gap: 8px; }
  button {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px;
    background: var(--panel-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 8px 16px; cursor: pointer;
    text-transform: uppercase; transition: all .12s ease;
  }
  button:hover { border-color: var(--cyan); color: #fff; }
  button.pause:hover  { border-color: var(--amber); color: var(--amber); }
  button.stop {
    border-color: var(--red); color: var(--red);
  }
  button.stop:hover { background: var(--red); color: #0a0e12; }

  main {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 0;
  }

  aside {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 16px; overflow-y: auto;
  }
  aside h2 {
    font-family: "Chakra Petch", sans-serif;
    font-size: 11px; letter-spacing: 3px; color: var(--dim);
    margin: 0 0 12px; text-transform: uppercase;
  }
  .peer {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; margin-bottom: 6px;
    border: 1px solid var(--line); border-radius: 2px;
    background: var(--panel-2); font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
         box-shadow: 0 0 8px var(--green); flex: none; }
  .peer.empty { color: var(--dim); border-style: dashed; justify-content: center; }

  .feed-wrap { display: grid; grid-template-rows: 1fr auto; min-height: 0; }

  #feed { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }

  .msg {
    border-left: 2px solid var(--line);
    padding: 6px 12px; background: var(--panel);
    border-radius: 0 3px 3px 0;
    animation: slidein .18s ease;
  }
  @keyframes slidein { from { opacity: 0; transform: translateX(-6px); } }

  .meta { font-size: 11px; color: var(--dim); display: flex; gap: 8px; align-items: baseline; }
  .who { font-weight: 600; }
  .arrow { color: var(--dim); }
  .to-all { color: var(--cyan); }
  .body { margin-top: 3px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }

  .msg.system { border-left-color: var(--dim); opacity: .7; font-style: italic; }
  .msg.system .body { color: var(--dim); font-size: 12px; }
  .msg.control { border-left-color: var(--red); }
  .msg.control .body { color: var(--red); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .msg.from-human { border-left-color: var(--human); background: rgba(192,139,255,.05); }

  .composer {
    border-top: 1px solid var(--line);
    background: var(--panel-2);
    padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end;
  }
  select, textarea {
    font-family: "IBM Plex Mono", monospace; font-size: 13px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px; padding: 9px 11px;
  }
  select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  textarea { flex: 1; resize: none; height: 42px; line-height: 1.4; }
  .target-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); display: block; margin-bottom: 4px; text-transform: uppercase; }
  .send-btn { border-color: var(--cyan); color: var(--cyan); }
  .send-btn:hover { background: var(--cyan); color: #0a0e12; }

  .conn { font-size: 11px; letter-spacing: 2px; color: var(--dim); }
  .conn.live { color: var(--green); }
  .conn.dead { color: var(--red); }
</style>
</head>
<body>
  <header>
    <div class="brand">WAR&nbsp;<b>ROOM</b></div>
    <div id="mode" class="mode-badge mode-running">running</div>
    <span id="conn" class="conn">connecting…</span>
    <div class="spacer"></div>
    <div class="controls">
      <button class="pause" onclick="ctl('pause')">Pause</button>
      <button onclick="ctl('resume')">Resume</button>
      <button class="stop" onclick="ctl('stop')">Stop&nbsp;All</button>
      <button onclick="ctl('reset')">Reset</button>
    </div>
  </header>

  <main>
    <aside>
      <h2>Connected agents</h2>
      <div id="peers"></div>
    </aside>

    <div class="feed-wrap">
      <div id="feed"></div>
      <div class="composer">
        <div>
          <label class="target-label">target</label>
          <select id="target"><option value="all">all (broadcast)</option></select>
        </div>
        <textarea id="input" placeholder="inject a message as operator…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send-btn" onclick="sendHuman()">Send</button>
      </div>
    </div>
  </main>

<script>
  const PALETTE = ["#ffb22e", "#4fd67a", "#38c6d9", "#ff7eb6", "#9d8bff", "#ffd95e", "#5ad1b0"];
  const colorFor = (() => {
    const map = new Map();
    let i = 0;
    return (name) => {
      if (name === "human") return "var(--human)";
      if (name === "hub") return "var(--dim)";
      if (!map.has(name)) map.set(name, PALETTE[i++ % PALETTE.length]);
      return map.get(name);
    };
  })();

  const feed = document.getElementById("feed");
  const peersEl = document.getElementById("peers");
  const targetEl = document.getElementById("target");
  const modeEl = document.getElementById("mode");
  const connEl = document.getElementById("conn");
  let ws = null;

  function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function addMessage(m) {
    const div = document.createElement("div");
    let cls = "msg " + (m.kind || "message");
    if (m.sender === "human") cls += " from-human";
    div.className = cls;

    const meta = document.createElement("div");
    meta.className = "meta";
    const who = document.createElement("span");
    who.className = "who"; who.textContent = m.sender;
    who.style.color = colorFor(m.sender);
    const arrow = document.createElement("span"); arrow.className = "arrow"; arrow.textContent = "→";
    const to = document.createElement("span");
    if (m.recipient === "all") { to.className = "to-all"; to.textContent = "all"; }
    else { to.textContent = m.recipient; to.style.color = colorFor(m.recipient); }
    const t = document.createElement("span"); t.style.marginLeft = "auto"; t.textContent = fmtTime(m.ts);

    if (m.kind === "system") {
      meta.append(who, t);
    } else {
      meta.append(who, arrow, to, t);
    }
    const body = document.createElement("div");
    body.className = "body"; body.textContent = m.content;

    div.append(meta, body);
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function setMode(mode) {
    modeEl.textContent = mode;
    modeEl.className = "mode-badge mode-" + mode;
  }

  function setPeers(peers) {
    peersEl.innerHTML = "";
    const current = targetEl.value;
    targetEl.innerHTML = '<option value="all">all (broadcast)</option>';
    if (!peers.length) {
      const e = document.createElement("div");
      e.className = "peer empty"; e.textContent = "— none —";
      peersEl.appendChild(e);
    }
    for (const p of peers) {
      const row = document.createElement("div");
      row.className = "peer";
      const dot = document.createElement("span"); dot.className = "dot"; dot.style.background = colorFor(p);
      const name = document.createElement("span"); name.textContent = p; name.style.color = colorFor(p);
      row.append(dot, name);
      peersEl.appendChild(row);

      const opt = document.createElement("option");
      opt.value = p; opt.textContent = p;
      targetEl.appendChild(opt);
    }
    targetEl.value = [...targetEl.options].some(o => o.value === current) ? current : "all";
  }

  function ctl(action) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ action })); }

  function sendHuman() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ say: text, to: targetEl.value }));
    input.value = "";
  }

  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendHuman(); }
  });

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ui`);
    ws.onopen = () => { connEl.textContent = "● live"; connEl.className = "conn live"; };
    ws.onclose = () => {
      connEl.textContent = "● disconnected"; connEl.className = "conn dead";
      setTimeout(connect, 1500);
    };
    ws.onmessage = (ev) => {
      const e = JSON.parse(ev.data);
      if (e.type === "snapshot") {
        setMode(e.mode); setPeers(e.peers);
        feed.innerHTML = ""; (e.log || []).forEach(addMessage);
      } else if (e.type === "message") {
        addMessage(e.message);
      } else if (e.type === "mode") {
        setMode(e.mode);
      } else if (e.type === "peers") {
        setPeers(e.peers);
      }
    };
  }
  connect();
</script>
</body>
</html>
