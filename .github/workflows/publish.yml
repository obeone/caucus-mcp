# Automatic PyPI publishing.
#
# Fires when a GitHub Release is published (the release-please merge in
# `changelog.yml` is what creates it) and ships the tagged version to PyPI.
# Manual `workflow_dispatch` is kept as an escape hatch for re-runs.
#
# Authentication is PyPI Trusted Publishing (OIDC) — no API token is stored as
# a secret. Configure the trusted publisher once on PyPI:
#   Project "caucus-mcp" -> Settings -> Publishing -> add a GitHub publisher
#     Owner:        obeone
#     Repository:   caucus-mcp
#     Workflow:     publish.yml
#     Environment:  pypi
#
# Note on auto-chaining: a Release created by release-please's default
# GITHUB_TOKEN does NOT, by GitHub design, trigger this workflow. To chain
# them automatically, give release-please a PAT or GitHub App token (the
# `token:` input in changelog.yml). Otherwise publish manually from the
# Actions tab, or let the `release: published` event fire when a maintainer
# publishes the release by hand.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build and publish (e.g. v1.2.1)"
        required: true

# Least privilege: building the dists needs nothing writable; the OIDC token
# (`id-token: write`) is what authenticates to PyPI Trusted Publishing.
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On release the default ref is the tag; on manual dispatch use the
          # tag the operator named.
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      # Guard against a tag / pyproject mismatch reaching PyPI. The expected
      # version is the release tag (or dispatch input) with the leading `v`
      # stripped; it must equal the built artifact's version.
      - name: Verify tag matches package version
        run: |
          ref="${{ github.event.inputs.ref || github.ref_name }}"
          tag_version="${ref#v}"
          built="$(ls dist/*.tar.gz | sed -E 's/.*caucus_mcp-(.*)\.tar\.gz/\1/')"
          echo "Tag version:   $tag_version"
          echo "Built version: $built"
          if [ "$tag_version" != "$built" ]; then
            echo "::error::Tag ($tag_version) does not match built version ($built)."
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Binds the run to the `pypi` environment named in the PyPI trusted
    # publisher config; gate it with required reviewers in repo settings to
    # require a human approval before any upload.
    environment:
      name: pypi
      url: https://pypi.org/project/caucus-mcp/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
