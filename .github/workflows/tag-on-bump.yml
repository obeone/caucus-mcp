# Tag every version bump.
#
# Watches `[project].version` in pyproject.toml — the single source of truth —
# and creates the matching `vX.Y.Z` git tag whenever it changes on `main`.
#
# This is a safety net, not a competitor to release-please: it is idempotent
# and a strict no-op when the tag already exists. So:
#   - release-please path: release-please already created `vX.Y.Z` when its
#     release PR merged -> this workflow sees the tag and does nothing.
#   - manual path: a hand-made `chore(release): bump version to X.Y.Z` commit
#     (the repo's documented convention) has no tag -> this workflow creates it.
#
# Note: a tag pushed with the default GITHUB_TOKEN does NOT, by GitHub design,
# retrigger other workflows. So a tag created here will not by itself fire
# publish.yml (which keys off a published Release, produced by release-please).
# This workflow only guarantees the tag exists; it does not publish.
name: Tag on version bump

on:
  push:
    branches: [main]
    # Only bother when the version file itself changed.
    paths:
      - pyproject.toml
  # Manual escape hatch to backfill a tag for the current version.
  workflow_dispatch:

# Pushing a tag is a write to the repo; nothing else is needed.
permissions:
  contents: write

# Serialize runs so two quick pushes can't race to create the same tag.
concurrency:
  group: tag-on-bump
  cancel-in-progress: false

jobs:
  tag:
    name: Create vX.Y.Z tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: ver
        run: |
          # tomllib ships with the runner's Python 3.11+, so parse the file
          # properly instead of grepping — robust against formatting changes.
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${version}"

      - name: Create and push tag if it does not exist
        env:
          GIT_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # Ask the remote directly so we don't depend on local tag refs.
          if [ -n "$(git ls-remote --tags origin "refs/tags/${GIT_TAG}")" ]; then
            echo "Tag ${GIT_TAG} already exists on origin — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${GIT_TAG}" -m "Release ${GIT_TAG}"
          git push origin "${GIT_TAG}"
          echo "Created and pushed ${GIT_TAG}."
