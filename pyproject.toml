[project]
name = "warroom"
version = "0.1.0"
description = "Central hub + MCP bridge letting multiple agents (any MCP client) talk to each other under human supervision."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pydantic>=2.7",
    "coloredlogs>=15.0",
    "mcp[cli]>=1.2",
]

[project.scripts]
warroom-hub = "warroom.hub:main"
warroom-bridge = "warroom.mcp_bridge:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.5",
    "mypy>=1.10",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/warroom"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra -q"
