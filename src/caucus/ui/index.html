<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAUCUS // operator console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!--
  iA Writer Quattro S: narrow humanist quasi-monospace, exceptional for reading
  dense prose in a dark terminal context. Falls back gracefully to Georgia/serif.
  JetBrains Mono: code blocks — distinct from the chrome monospace.
  Chakra Petch + IBM Plex Mono: chrome (header, labels, badges, composer) unchanged.
-->
<!-- Google Fonts injected after load so a hanging CDN never blocks window.onload -->
<style>
  :root {
    --bg: #0a0e12;
    --panel: #11171d;
    --panel-2: #161e26;
    --line: #233039;
    --ink: #c9d6de;
    --dim: #6b7d89;
    --amber: #ffb22e;
    --green: #4fd67a;
    --red: #ff4d5e;
    --cyan: #38c6d9;
    --human: #c08bff;
    --grain: rgba(255, 255, 255, 0.012);

    /* Body typography — readable proportional font for message content */
    --body-font: "iA Writer Quattro S", "iA Writer Quattro", Georgia, serif;
    --body-size: 15.5px;
    --body-lh: 1.72;

    /* Code typography — distinct from chrome monospace */
    --code-font: "JetBrains Mono", "IBM Plex Mono", monospace;
    --code-size: 13px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Mono", monospace;
    font-size: 14px;
  }

  body {
    background-image:
      repeating-linear-gradient(0deg, var(--grain) 0 1px, transparent 1px 3px),
      radial-gradient(120% 80% at 50% -10%, rgba(56, 198, 217, 0.07), transparent 60%);
    display: grid;
    grid-template-rows: auto auto 1fr;
    height: 100vh;
  }

  /* ─── Header chrome — unchanged ─── */
  header {
    display: flex; align-items: center; gap: 18px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
  }

  .brand {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 4px;
    font-size: 18px; color: var(--ink);
  }
  .brand b { color: var(--amber); }

  .mode-badge {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 3px;
    padding: 5px 14px; border-radius: 2px;
    border: 1px solid var(--line);
    text-transform: uppercase;
  }
  .mode-running { color: var(--green); border-color: var(--green); box-shadow: 0 0 16px -6px var(--green); }
  .mode-paused  { color: var(--amber); border-color: var(--amber); box-shadow: 0 0 16px -6px var(--amber); animation: blink 1.1s steps(2) infinite; }
  .mode-stopped { color: var(--red); border-color: var(--red); box-shadow: 0 0 16px -6px var(--red); }
  @keyframes blink { 50% { opacity: 0.35; } }

  .spacer { flex: 1; }

  .export-group { display: flex; gap: 6px; margin-right: 12px; }
  .export-group select {
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px; padding: 0 8px;
  }
  .export-group select:focus { outline: none; border-color: var(--cyan); }

  .controls { display: flex; gap: 8px; }
  button {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px;
    background: var(--panel-2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 8px 16px; cursor: pointer;
    text-transform: uppercase; transition: all .12s ease;
  }
  button:hover { border-color: var(--cyan); color: #fff; }
  button.pause:hover  { border-color: var(--amber); color: var(--amber); }
  button.stop { border-color: var(--red); color: var(--red); }
  button.stop:hover { background: var(--red); color: #0a0e12; }

  /* ─── Layout ─── */
  main {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 0;
  }

  /* ─── Sidebar — unchanged ─── */
  aside {
    border-right: 1px solid var(--line);
    background: var(--panel);
    padding: 16px; overflow-y: auto;
  }
  aside h2 {
    font-family: "Chakra Petch", sans-serif;
    font-size: 11px; letter-spacing: 3px; color: var(--dim);
    margin: 0 0 12px; text-transform: uppercase;
  }
  .peer {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; margin-bottom: 6px;
    border: 1px solid var(--line); border-radius: 2px;
    background: var(--panel-2); font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
         box-shadow: 0 0 8px var(--green); flex: none; }
  .peer.empty { color: var(--dim); border-style: dashed; justify-content: center; }
  .peer-kick {
    margin-left: auto; padding: 1px 6px;
    font-family: "IBM Plex Mono", monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0; text-transform: none;
    background: transparent; color: transparent;
    border: 1px solid transparent; border-radius: 2px;
    cursor: pointer; transition: all .12s ease;
    line-height: 1.4;
  }
  .peer:hover .peer-kick {
    color: var(--dim); border-color: var(--line);
  }
  .peer-kick:hover {
    color: var(--red) !important; border-color: var(--red) !important;
    background: rgba(255, 77, 94, 0.08) !important;
  }

  /* ─── Feed ─── */
  #feed {
    overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column;
    gap: 0; /* gaps handled by msg margin-bottom */
  }

  /* ─── Message card ─── */
  .msg {
    border-left: 3px solid var(--line);
    padding: 16px 22px 20px;
    background: var(--panel);
    border-radius: 0 5px 5px 0;
    animation: slidein .22s cubic-bezier(.2,.7,.4,1);
    margin-bottom: 14px;
    position: relative;
    /* subtle inner shadow to lift card off feed background */
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 1px 4px rgba(0,0,0,0.25);
  }

  /* consecutive same-sender — tighten the gap slightly */
  .msg + .msg { margin-top: 0; }

  @keyframes slidein {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ─── Meta line (sender → recipient  timestamp) — stays monospace chrome ─── */
  .meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; color: var(--dim);
    display: flex; gap: 8px; align-items: baseline;
    margin-bottom: 12px;
    padding-bottom: 9px;
    border-bottom: 1px solid var(--line);
    letter-spacing: 0.3px;
  }
  .who { font-weight: 600; font-size: 12px; }
  .arrow { color: var(--dim); }
  .to-all { color: var(--cyan); }

  /* ─── Routing badge: BROADCAST / DIRECT ─── */
  .route-badge {
    font-family: "Chakra Petch", sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    padding: 2px 6px; border-radius: 2px;
    text-transform: uppercase; opacity: .75;
    border: 1px solid;
  }
  .route-badge.broadcast { color: var(--cyan); border-color: var(--cyan); }
  .route-badge.direct    { color: var(--amber); border-color: var(--amber); }
  .route-badge.channel   { color: #5ad1b0; border-color: #5ad1b0; }
  .route-badge.to-human  {
    color: #0d0f12; background: var(--human); border-color: var(--human);
    opacity: 1;
  }

  /* ─── Clickable names — pick a reply target from sidebar / meta line ─── */
  .pick-target { cursor: pointer; }
  .pick-target:hover { text-decoration: underline; filter: brightness(1.25); }

  /* ─── Message body — proportional readable font ─── */
  .body {
    font-family: var(--body-font);
    font-size: var(--body-size);
    line-height: var(--body-lh);
    color: var(--ink);
    word-break: break-word;
  }

  /* markdown-rendered content resets */
  .body p           { margin: 0 0 1em; }
  .body p:last-child { margin-bottom: 0; }

  /* headings — chrome sans-serif so they read as structure, not prose */
  .body .md-h {
    font-family: "Chakra Petch", sans-serif;
    color: #e8f1f6; font-weight: 700;
    line-height: 1.3; margin: 0.2em 0 0.6em;
  }
  .body .md-h:first-child { margin-top: 0; }
  .body h1.md-h { font-size: 1.5em; letter-spacing: 0.5px; }
  .body h2.md-h { font-size: 1.3em; letter-spacing: 0.4px; }
  .body h3.md-h { font-size: 1.15em; }
  .body h4.md-h, .body h5.md-h, .body h6.md-h {
    font-size: 1em; color: var(--amber);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .body ul, .body ol {
    margin: 0.55em 0 1em 1.5em; padding: 0;
  }
  .body li          { margin-bottom: 0.4em; line-height: var(--body-lh); }
  .body li:last-child { margin-bottom: 0; }

  /* nested lists */
  .body li > ul, .body li > ol { margin-top: 0.3em; margin-bottom: 0.3em; }

  .body strong { color: #e8f1f6; font-weight: 700; }
  .body em     { font-style: italic; color: #b8cad4; }

  /* inline code — back to monospace, clearly distinct */
  .body code {
    font-family: var(--code-font);
    font-size: var(--code-size);
    background: rgba(56, 198, 217, 0.1);
    color: var(--cyan);
    padding: 0.15em 0.42em;
    border-radius: 3px;
    border: 1px solid rgba(56, 198, 217, 0.18);
    white-space: nowrap;
    /* keep inline code on same baseline rhythm */
    vertical-align: 0.05em;
  }

  /* fenced code blocks */
  .body pre {
    margin: 0.9em 0 1.05em;
    background: #080c10;
    border: 1px solid var(--line);
    border-left: 3px solid var(--cyan);
    border-radius: 0 5px 5px 0;
    overflow-x: auto;
    position: relative;
  }
  /* language label in top-right corner */
  .body pre[data-lang]::before {
    content: attr(data-lang);
    position: absolute; top: 0; right: 0;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: 1.5px;
    color: var(--dim);
    background: rgba(56, 198, 217, 0.07);
    padding: 3px 8px;
    border-bottom-left-radius: 4px;
    text-transform: lowercase;
  }
  .body pre code {
    display: block;
    padding: 14px 16px;
    background: transparent;
    color: #a8d9e6;
    border: none;
    white-space: pre;
    font-size: 13px;
    line-height: 1.6;
  }

  /* links */
  .body a {
    color: var(--cyan);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }
  .body a:hover { color: #fff; text-decoration-color: #fff; }

  /* ─── Message kind variants ─── */

  /* system: dim, italic, compact — infrastructure noise, doesn't compete */
  .msg.system {
    border-left-color: rgba(107, 125, 137, 0.4);
    background: transparent;
    box-shadow: none;
    margin-bottom: 5px;
    padding: 5px 14px 5px 16px;
  }
  .msg.system .meta {
    border-bottom: none; margin-bottom: 3px; padding-bottom: 0;
    font-size: 10.5px;
  }
  .msg.system .body {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; line-height: 1.5;
    color: var(--dim); font-style: italic;
  }

  /* control: red stripe — stop/pause notices, compact but unmissable */
  .msg.control {
    border-left-color: var(--red);
    background: rgba(255, 77, 94, 0.06);
    box-shadow: inset 0 1px 0 rgba(255,77,94,0.1), 0 1px 4px rgba(0,0,0,0.25);
    margin-bottom: 6px;
    padding: 9px 14px 9px 16px;
  }
  .msg.control .meta { border-bottom: none; margin-bottom: 4px; padding-bottom: 0; }
  .msg.control .body {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px; line-height: 1.5;
    color: var(--red);
    font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* from-human: purple accent, distinct card treatment */
  .msg.from-human {
    border-left-color: var(--human);
    background: rgba(192, 139, 255, 0.06);
    box-shadow: inset 0 1px 0 rgba(192,139,255,0.08), 0 1px 4px rgba(0,0,0,0.25);
  }
  .msg.from-human .meta { border-bottom-color: rgba(192, 139, 255, 0.2); }

  /* to-human: a message aimed at the operator — lift it above peer chatter */
  .msg.to-human {
    border-left-color: var(--human);
    border-left-width: 5px;
    background: rgba(192, 139, 255, 0.10);
    box-shadow:
      inset 0 1px 0 rgba(192,139,255,0.12),
      0 0 0 1px rgba(192,139,255,0.30),
      0 4px 18px rgba(192,139,255,0.18);
  }
  .msg.to-human .meta { border-bottom-color: rgba(192, 139, 255, 0.28); }
  /* answer: amber stripe — form answers submitted by operator */
  .msg.answer {
    border-left-color: var(--amber);
    background: rgba(255, 178, 46, 0.04);
    box-shadow: inset 0 1px 0 rgba(255,178,46,0.06), 0 1px 4px rgba(0,0,0,0.25);
    margin-bottom: 6px;
    padding: 9px 14px 9px 16px;
  }
  .msg.answer .meta { border-bottom-color: rgba(255, 178, 46, 0.18); }
  .msg.answer .body {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; line-height: 1.5;
    color: var(--amber);
  }

  /* ─── Sidebar — Channels section ─── */
  .channels-section { margin-top: 20px; }
  .channel-row {
    display: flex; flex-direction: column;
    padding: 7px 9px; margin-bottom: 6px;
    border: 1px solid var(--line); border-radius: 2px;
    background: var(--panel-2); font-size: 13px;
    gap: 4px;
  }
  .channel-name {
    font-weight: 600; font-size: 12px; letter-spacing: 0.3px;
  }
  .channel-topic {
    font-size: 10.5px; color: var(--dim); line-height: 1.4;
    padding-left: 4px; font-style: italic;
  }
  .channel-topic.empty { opacity: 0.5; }
  .channel-members {
    font-size: 10.5px; color: var(--dim); line-height: 1.4;
    padding-left: 4px;
  }

  /* ─── Feed filter bar ─── */
  .feed-wrap { display: grid; grid-template-rows: auto auto 1fr auto; min-height: 0; }
  .filter-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .filter-bar label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; white-space: nowrap;
  }
  .filter-bar select {
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 4px 8px;
  }
  .filter-bar select:focus { outline: none; border-color: var(--cyan); }

  /* ─── Pending forms area ─── */
  #forms-area {
    display: none; /* hidden when empty */
    flex-direction: column;
    gap: 0;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    max-height: 220px;
    overflow-y: auto;
  }
  #forms-area.has-forms { display: flex; }

  .forms-header {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 20px 5px;
    position: sticky; top: 0; z-index: 1;
    background: var(--panel);
    border-bottom: 1px solid rgba(255,178,46,0.15);
  }
  .forms-header-label {
    font-family: "Chakra Petch", sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--amber); text-transform: uppercase;
  }
  .forms-header-count {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--dim);
    background: rgba(255,178,46,0.12);
    border: 1px solid rgba(255,178,46,0.25);
    border-radius: 2px; padding: 1px 6px;
  }
  #forms-list {
    display: flex; flex-direction: column; gap: 0;
  }

  .form-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 20px;
    border-left: 3px solid var(--amber);
    border-bottom: 1px solid rgba(255,178,46,0.08);
    animation: slidein .18s cubic-bezier(.2,.7,.4,1);
    background: rgba(255, 178, 46, 0.03);
  }
  .form-entry:last-child { border-bottom: none; }

  .form-entry-meta {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 1px;
  }
  .form-entry-title {
    font-family: "Chakra Petch", sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .form-entry-sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .form-entry-actions { display: flex; gap: 6px; flex: none; }

  .btn-answer {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px; font-size: 10px;
    padding: 5px 12px; border-radius: 2px; cursor: pointer;
    background: transparent; color: var(--amber);
    border: 1px solid var(--amber); text-transform: uppercase;
    transition: all .12s ease;
  }
  .btn-answer:hover { background: var(--amber); color: #0a0e12; }

  .btn-dismiss {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0;
    padding: 4px 8px; border-radius: 2px; cursor: pointer;
    background: transparent; color: var(--dim);
    border: 1px solid transparent; text-transform: none;
    transition: all .12s ease;
  }
  .btn-dismiss:hover { color: var(--red); border-color: var(--red); background: rgba(255,77,94,0.08); }

  /* ─── Composer — unchanged chrome ─── */
  .composer {
    border-top: 1px solid var(--line);
    background: var(--panel-2);
    padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end;
  }
  select, textarea {
    font-family: "IBM Plex Mono", monospace; font-size: 13px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px; padding: 9px 11px;
  }
  select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  textarea { flex: 1; resize: none; height: 42px; line-height: 1.4; }
  .target-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); display: block; margin-bottom: 4px; text-transform: uppercase; }
  .send-btn { border-color: var(--cyan); color: var(--cyan); }
  .send-btn:hover { background: var(--cyan); color: #0a0e12; }

  .conn { font-size: 11px; letter-spacing: 2px; color: var(--dim); }
  .conn.live { color: var(--green); }
  .conn.dead { color: var(--red); }

  /* ─── Talking-stick floor strip ─── */
  #floor-strip {
    display: none; /* hidden when no active floors */
    flex-direction: column; gap: 8px;
    padding: 10px 20px;
    border-bottom: 2px solid var(--amber);
    background: rgba(255, 178, 46, 0.07);
    box-shadow: inset 0 -1px 0 rgba(255,178,46,0.18), 0 2px 12px rgba(255,178,46,0.08);
  }
  #floor-strip.active { display: flex; }

  .floor-entry {
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 10px;
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    padding: 6px 10px;
    border: 1px solid rgba(255,178,46,0.35); border-radius: 2px;
    background: rgba(255,178,46,0.04);
  }
  .floor-label {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 3px; font-size: 11px;
    color: var(--amber); text-transform: uppercase;
    white-space: nowrap;
  }
  .floor-holder { font-weight: 600; font-size: 13px; }
  .floor-scope {
    color: var(--dim); font-size: 11px; letter-spacing: 1px; white-space: nowrap;
  }
  .floor-scope b { color: var(--cyan); }
  .floor-reason {
    color: var(--ink); font-style: italic; font-size: 11.5px; flex: 1;
    min-width: 0; word-break: break-word;
  }
  .floor-hands {
    color: var(--dim); font-size: 11px; white-space: nowrap;
  }
  .floor-hands b { color: var(--green); }
  .floor-clear {
    margin-left: auto; padding: 2px 8px;
    font-family: "Chakra Petch", sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
    background: transparent; color: var(--amber);
    border: 1px solid var(--amber); border-radius: 2px;
    cursor: pointer; transition: all .12s ease;
    flex: none;
  }
  .floor-clear:hover {
    background: var(--amber); color: #0a0e12;
  }
  /* ─── Form wizard modal ─── */
  #wizard-backdrop {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(10, 14, 18, 0.88);
    backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
    animation: fadein .16s ease;
  }
  #wizard-backdrop.open { display: flex; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  #wizard {
    width: min(560px, 92vw);
    background: var(--panel);
    border: 1px solid var(--amber);
    border-top: 3px solid var(--amber);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 40px -12px rgba(255,178,46,0.2);
    display: flex; flex-direction: column;
    max-height: 90vh;
    animation: wizard-in .2s cubic-bezier(.2,.7,.4,1);
  }
  @keyframes wizard-in {
    from { opacity: 0; transform: translateY(-18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .wizard-head {
    padding: 16px 22px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 4px;
  }
  .wizard-title {
    font-family: "Chakra Petch", sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    color: var(--ink);
  }
  .wizard-sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 0.5px;
  }
  .wizard-progress {
    margin-top: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .wizard-progress-bar {
    flex: 1; height: 2px;
    background: var(--line); border-radius: 1px; overflow: hidden;
  }
  .wizard-progress-fill {
    height: 100%; background: var(--amber);
    border-radius: 1px; transition: width .2s ease;
  }
  .wizard-progress-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 1px;
    white-space: nowrap;
  }

  .wizard-body {
    padding: 22px;
    overflow-y: auto; flex: 1;
  }

  /* ─── Wizard field label ─── */
  .wizard-field-label {
    font-family: "Chakra Petch", sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--ink); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .wizard-required {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: 1px; color: var(--amber);
    background: rgba(255,178,46,0.1); border: 1px solid rgba(255,178,46,0.2);
    border-radius: 2px; padding: 1px 5px;
  }

  /* ─── Radio / checkbox options ─── */
  .wizard-options { display: flex; flex-direction: column; gap: 8px; }

  .wizard-option {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 13px; border-radius: 2px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    cursor: pointer; transition: border-color .1s, background .1s;
    user-select: none;
  }
  .wizard-option:hover { border-color: var(--amber); background: rgba(255,178,46,0.04); }
  .wizard-option.selected {
    border-color: var(--amber);
    background: rgba(255,178,46,0.08);
  }
  .wizard-option input[type="radio"],
  .wizard-option input[type="checkbox"] {
    accent-color: var(--amber);
    width: 14px; height: 14px; flex: none;
    cursor: pointer;
    font-family: inherit; font-size: inherit;
    background: var(--bg); border-color: var(--line);
    padding: 0;
  }
  .wizard-option-text {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px; color: var(--ink);
  }

  /* "Other…" free-text input that appears when "Other" chosen */
  .wizard-other-input {
    margin-top: 6px; margin-left: 24px;
    display: none;
  }
  .wizard-other-input.visible { display: block; }
  .wizard-other-input input {
    width: 100%;
    font-family: "IBM Plex Mono", monospace; font-size: 12.5px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--amber); border-radius: 2px;
    padding: 7px 10px;
    outline: none;
  }
  .wizard-other-input input:focus { border-color: var(--cyan); }

  /* ─── Text / textarea inputs ─── */
  .wizard-text-input,
  .wizard-textarea-input {
    width: 100%;
    font-family: "IBM Plex Mono", monospace; font-size: 13px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 9px 11px;
    outline: none; resize: vertical;
    transition: border-color .1s;
  }
  .wizard-text-input:focus,
  .wizard-textarea-input:focus { border-color: var(--cyan); }
  .wizard-textarea-input { min-height: 90px; line-height: 1.5; }

  /* ─── Validation error ─── */
  .wizard-error {
    margin-top: 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--red);
    letter-spacing: 0.5px;
    display: none;
  }
  .wizard-error.visible { display: block; }

  /* ─── Recap card ─── */
  .recap-list { display: flex; flex-direction: column; gap: 10px; }
  .recap-item {
    border-left: 2px solid var(--amber);
    padding: 8px 12px;
    background: var(--panel-2);
    border-radius: 0 2px 2px 0;
  }
  .recap-item-label {
    font-family: "Chakra Petch", sans-serif;
    font-size: 10px; letter-spacing: 1.5px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .recap-item-value {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px; color: var(--ink); line-height: 1.5;
  }
  .recap-item-value.empty { color: var(--dim); font-style: italic; }

  /* ─── Wizard footer ─── */
  .wizard-foot {
    padding: 14px 22px;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  .wizard-foot .spacer { flex: 1; }

  .btn-wiz-back {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px; font-size: 11px;
    padding: 7px 14px; border-radius: 2px; cursor: pointer;
    background: transparent; color: var(--dim);
    border: 1px solid var(--line); text-transform: uppercase;
    transition: all .12s ease;
  }
  .btn-wiz-back:hover { border-color: var(--ink); color: var(--ink); }

  .btn-wiz-next {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px; font-size: 11px;
    padding: 7px 16px; border-radius: 2px; cursor: pointer;
    background: transparent; color: var(--amber);
    border: 1px solid var(--amber); text-transform: uppercase;
    transition: all .12s ease;
  }
  .btn-wiz-next:hover { background: var(--amber); color: #0a0e12; }

  .btn-wiz-submit {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px; font-size: 11px;
    padding: 7px 20px; border-radius: 2px; cursor: pointer;
    background: var(--amber); color: #0a0e12;
    border: 1px solid var(--amber); text-transform: uppercase;
    transition: all .12s ease;
    box-shadow: 0 0 16px -6px var(--amber);
  }
  .btn-wiz-submit:hover { background: #ffc74d; border-color: #ffc74d; }

  .btn-wiz-cancel {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; letter-spacing: 2px; font-size: 11px;
    padding: 7px 14px; border-radius: 2px; cursor: pointer;
    background: transparent; color: var(--red);
    border: 1px solid var(--red); text-transform: uppercase;
    transition: all .12s ease;
  }
  .btn-wiz-cancel:hover { background: var(--red); color: #0a0e12; }
</style>
</head>
<body>
  <header>
    <div class="brand">WAR&nbsp;<b>ROOM</b></div>
    <div id="mode" class="mode-badge mode-running">running</div>
    <span id="conn" class="conn">connecting…</span>
    <div class="spacer"></div>
    <div class="export-group">
      <select id="export-format" title="transcript format">
        <option value="markdown">Markdown</option>
        <option value="json">JSON</option>
        <option value="text">Text</option>
      </select>
      <button onclick="exportChat()">Export</button>
    </div>
    <div class="controls">
      <button class="pause" onclick="ctl('pause')">Pause</button>
      <button onclick="ctl('resume')">Resume</button>
      <button class="stop" onclick="ctl('stop')">Stop&nbsp;All</button>
      <button onclick="ctl('reset')">Reset</button>
    </div>
  </header>

  <!-- ─── Talking-stick floor strip — visible only when ≥1 floor is active ─── -->
  <div id="floor-strip"></div>

  <main>
    <aside>
      <h2>Connected agents</h2>
      <div id="peers"></div>
      <div class="channels-section">
        <h2>Channels</h2>
        <div id="channels"></div>
      </div>
    </aside>

    <div class="feed-wrap">
      <div class="filter-bar">
        <label for="filter-select">filter</label>
        <select id="filter-select">
          <option value="all">All</option>
          <option value="broadcast">Broadcast</option>
          <option value="direct">Direct</option>
        </select>
      </div>

      <!-- Pending forms tray — hidden when empty, amber-accented -->
      <div id="forms-area">
        <div class="forms-header">
          <span class="forms-header-label">Pending forms</span>
          <span class="forms-header-count" id="forms-count">0</span>
        </div>
        <div id="forms-list"></div>
      </div>

      <div id="feed"></div>
      <div class="composer">
        <div>
          <label class="target-label">target</label>
          <select id="target"><option value="all">all (broadcast)</option></select>
        </div>
        <textarea id="input" placeholder="inject a message as operator…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send-btn" onclick="sendHuman()">Send</button>
      </div>
    </div>
  </main>

  <!-- Form wizard modal -->
  <div id="wizard-backdrop" role="dialog" aria-modal="true" aria-labelledby="wizard-title-text">
    <div id="wizard">
      <div class="wizard-head">
        <div class="wizard-title" id="wizard-title-text"></div>
        <div class="wizard-sub" id="wizard-sub-text"></div>
        <div class="wizard-progress">
          <div class="wizard-progress-bar">
            <div class="wizard-progress-fill" id="wizard-progress-fill"></div>
          </div>
          <div class="wizard-progress-label" id="wizard-progress-label"></div>
        </div>
      </div>
      <div class="wizard-body" id="wizard-body"></div>
      <div class="wizard-foot" id="wizard-foot"></div>
    </div>
  </div>

<script>
  // ─── Colour palette ────────────────────────────────────────────────────────
  const PALETTE = ["#ffb22e", "#4fd67a", "#38c6d9", "#ff7eb6", "#9d8bff", "#ffd95e", "#5ad1b0"];
  const colorFor = (() => {
    const map = new Map();
    let i = 0;
    return (name) => {
      if (name === "human") return "var(--human)";
      if (name === "hub") return "var(--dim)";
      if (!map.has(name)) map.set(name, PALETTE[i++ % PALETTE.length]);
      return map.get(name);
    };
  })();

  // ─── Markdown renderer ────────────────────────────────────────────────────
  //
  // Self-contained, no external deps. Always HTML-escapes raw text FIRST, then
  // applies a whitelist of structural transforms over the already-escaped output
  // so agent content can never inject raw HTML.
  //
  // Supported: # / ## … ###### headings, paragraphs, **bold**, *italic*,
  //            `inline code`, ```fenced code blocks```, - / * / + unordered
  //            lists, 1. numbered lists, [text](url) links (https only).
  //
  function escapeHtml(s) {
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderMarkdown(text) {
    // Step 1: escape everything — from here on we only emit safe HTML tags.
    const raw = escapeHtml(text);

    // Step 2: extract fenced code blocks before any inline processing so their
    // contents are never touched by inline rules.
    const codeBlocks = [];
    let s = raw.replace(/```([^\n`]*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const idx = codeBlocks.length;
      // code is already HTML-escaped; trim trailing newline only.
      const langAttr = lang.trim() ? ` data-lang="${escapeHtml(lang.trim())}"` : "";
      codeBlocks.push(`<pre${langAttr}><code>${code.replace(/\n$/, "")}</code></pre>`);
      return `\x00CODE${idx}\x00`;
    });

    // Step 3: split into lines to handle block elements (lists, paragraphs).
    const lines = s.split("\n");
    const out = [];
    let inUL = false;
    let inOL = false;

    function closeList() {
      if (inUL) { out.push("</ul>"); inUL = false; }
      if (inOL) { out.push("</ol>"); inOL = false; }
    }

    function applyInline(line) {
      // Bold (**text** or __text__)
      line = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      line = line.replace(/__(.+?)__/g, "<strong>$1</strong>");
      // Italic (*text* or _text_) — single markers, not part of bold
      line = line.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");
      line = line.replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, "<em>$1</em>");
      // Inline code (must come after bold/italic to avoid conflict)
      line = line.replace(/`([^`]+)`/g, "<code>$1</code>");
      // Links — https:// or http:// only (already HTML-escaped, so href is safe)
      line = line.replace(
        /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
        '<a href="$2" rel="noopener noreferrer" target="_blank">$1</a>'
      );
      return line;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      // Code block placeholder — may appear anywhere on a line; restore as-is.
      // The placeholder \x00CODEn\x00 is our own sentinel so it can only appear
      // if we put it there — no user content can contain \x00.
      if (line.includes("\x00CODE")) {
        closeList();
        // A line may be entirely a placeholder, or have surrounding whitespace.
        const restored = line.replace(/\x00CODE(\d+)\x00/g, (_, n) => codeBlocks[parseInt(n, 10)]);
        out.push(restored);
        continue;
      }

      // ATX heading: 1–6 leading '#' followed by a space. Emitted as a
      // self-contained block tag so the paragraph-grouping pass leaves it alone.
      const hMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if (hMatch) {
        closeList();
        const level = hMatch[1].length;
        out.push(`<h${level} class="md-h">${applyInline(hMatch[2])}</h${level}>`);
        continue;
      }

      // Unordered list item: leading -, *, or +
      const ulMatch = line.match(/^(\s*)[*\-+]\s+(.*)$/);
      if (ulMatch) {
        if (inOL) { out.push("</ol>"); inOL = false; }
        if (!inUL) { out.push("<ul>"); inUL = true; }
        out.push(`<li>${applyInline(ulMatch[2])}</li>`);
        continue;
      }

      // Ordered list item: leading digits followed by . or )
      const olMatch = line.match(/^\s*\d+[.)]\s+(.*)$/);
      if (olMatch) {
        if (inUL) { out.push("</ul>"); inUL = false; }
        if (!inOL) { out.push("<ol>"); inOL = true; }
        out.push(`<li>${applyInline(olMatch[1])}</li>`);
        continue;
      }

      // Blank line — close lists, will become paragraph break
      if (line.trim() === "") {
        closeList();
        out.push("");
        continue;
      }

      // Regular line
      closeList();
      out.push(applyInline(line));
    }
    closeList();

    // Step 4: group non-empty, non-block lines into <p> elements.
    // Block elements (ul, ol, pre) are already self-contained tags.
    // Note: <pre> may have attributes (e.g. data-lang="python"), so match <pre[ >].
    const blockTagRe = /^<(ul|ol|li|h[1-6]|pre[ >]|pre$|\/ul|\/ol|\/pre)/;
    const segments = out.join("\n").split(/\n{2,}/);
    const final = segments.map(seg => {
      const trimmed = seg.trim();
      if (!trimmed) return "";
      // Already a block element — emit as-is
      if (blockTagRe.test(trimmed)) return trimmed;
      // Inline content — wrap in <p>, replace single newlines with <br>
      const inner = trimmed.split("\n").map(l => l.trim()).filter(Boolean).join("<br>");
      return `<p>${inner}</p>`;
    });

    return final.filter(Boolean).join("\n");
  }

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const feed = document.getElementById("feed");
  const peersEl = document.getElementById("peers");
  const channelsEl = document.getElementById("channels");
  const targetEl = document.getElementById("target");
  const filterEl = document.getElementById("filter-select");
  const modeEl = document.getElementById("mode");
  const connEl = document.getElementById("conn");
  const formsArea = document.getElementById("forms-area");
  const formsList = document.getElementById("forms-list");
  const formsCount = document.getElementById("forms-count");
  const wizardBackdrop = document.getElementById("wizard-backdrop");
  const wizardBody = document.getElementById("wizard-body");
  const wizardFoot = document.getElementById("wizard-foot");
  let ws = null;

  // ─── Module-level state ───────────────────────────────────────────────────
  let currentPeers = [];
  let channels = {};      // latest complete channel map: { "#name": { topic: str|null, members: [...] } }
  let allMessages = [];   // every message received, in order, for feed re-render
  let floors = {};        // active talking sticks: { "<scope>": { scope, holder, reason, hands, since } }

  // Pending forms map: id → form object
  let pendingForms = new Map();

  // Active wizard state
  let wizardState = null;
  // {
  //   form,          // the form object
  //   step,          // current step index (0..fields.length = recap)
  //   answers,       // { key: value } collected so far
  // }

  function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  // ─── passesFilter — predicate for active filter selection ────────────────
  function passesFilter(m, filter) {
    if (filter === "all") return true;
    // Under non-all filters, suppress system and control noise
    const kind = m.kind || "message";
    if (kind === "system" || kind === "control") return false;
    if (filter === "broadcast") return m.recipient === "all";
    if (filter === "direct") {
      return m.recipient !== "all" && !String(m.recipient).startsWith("#");
    }
    // specific channel filter (starts with "#")
    if (filter.startsWith("#")) return m.recipient === filter;
    return true;
  }

  // ─── buildMessageNode — constructs a .msg DOM node without appending ─────
  function buildMessageNode(m) {
    const div = document.createElement("div");
    let cls = "msg " + (m.kind || "message");
    if (m.sender === "human") cls += " from-human";
    // Messages addressed straight at the operator deserve to pop out of the
    // peer-to-peer chatter — flag the card so CSS can lift it.
    const toHuman = m.recipient === "human";
    if (toHuman) cls += " to-human";
    div.className = cls;

    // Meta line (monospace chrome — unchanged structure)
    const meta = document.createElement("div");
    meta.className = "meta";
    const who = document.createElement("span");
    who.className = "who"; who.textContent = m.sender;
    who.style.color = colorFor(m.sender);
    // A click on a sender (other than the human or system) replies to them.
    if (m.sender && m.sender !== "human" && m.sender !== "system") {
      makeTargetClickable(who, m.sender);
    }
    const arrow = document.createElement("span"); arrow.className = "arrow"; arrow.textContent = "→";
    const to = document.createElement("span");
    const isChannel = String(m.recipient).startsWith("#");
    if (m.recipient === "all") {
      to.className = "to-all"; to.textContent = "all";
    } else {
      // channel and direct recipients render the same here; the routing badge
      // below is what distinguishes them.
      to.textContent = m.recipient; to.style.color = colorFor(m.recipient);
      makeTargetClickable(to, m.recipient);
    }
    const t = document.createElement("span"); t.style.marginLeft = "auto"; t.textContent = fmtTime(m.ts);

    // Routing badge: broadcast / channel / direct — for normal message-kind only
    const isNormal = m.kind === "message" || !m.kind;
    if (isNormal) {
      const badge = document.createElement("span");
      if (m.recipient === "all") {
        badge.className = "route-badge broadcast"; badge.textContent = "broadcast";
      } else if (isChannel) {
        badge.className = "route-badge channel"; badge.textContent = "channel";
      } else if (toHuman) {
        badge.className = "route-badge to-human"; badge.textContent = "for you";
      } else {
        badge.className = "route-badge direct"; badge.textContent = "direct";
      }
      meta.append(who, arrow, to, badge, t);
    } else if (m.kind === "system") {
      meta.append(who, t);
    } else {
      meta.append(who, arrow, to, t);
    }

    // Body — markdown for message/human, plain-escaped for system/control/answer
    const body = document.createElement("div");
    body.className = "body";
    const useMarkdown = (m.kind === "message" || !m.kind || m.sender === "human");
    if (useMarkdown) {
      body.innerHTML = renderMarkdown(m.content);
    } else {
      body.textContent = m.content;
    }

    div.append(meta, body);
    return div;
  }

  // ─── isPinnedToBottom — true when the feed is scrolled at (or near) the end ─
  // A small slack absorbs sub-pixel rounding and lets "almost at the bottom"
  // still count as pinned, so we never yank the operator away from messages
  // they scrolled up to read.
  function isPinnedToBottom() {
    const slack = 24; // px
    return feed.scrollHeight - feed.scrollTop - feed.clientHeight <= slack;
  }

  // ─── renderFeed — re-render entire feed from allMessages + active filter ──
  function renderFeed() {
    const pinned = isPinnedToBottom();
    const filter = filterEl.value;
    feed.innerHTML = "";
    for (const m of allMessages) {
      if (passesFilter(m, filter)) {
        // Strip slide-in animation on re-renders to avoid mass jank
        const node = buildMessageNode(m);
        node.style.animation = "none";
        feed.appendChild(node);
      }
    }
    if (pinned) feed.scrollTop = feed.scrollHeight;
  }

  // ─── addMessage — records to allMessages; appends live if filter passes ──
  function addMessage(m) {
    allMessages.push(m);
    const filter = filterEl.value;
    if (!passesFilter(m, filter)) return;
    // Capture pin state before the DOM grows, so a message arriving while the
    // operator is reading scrollback doesn't drag them back to the bottom.
    const pinned = isPinnedToBottom();
    const node = buildMessageNode(m);
    feed.appendChild(node);
    if (pinned) feed.scrollTop = feed.scrollHeight;
  }

  // ─── setMode — unchanged ─────────────────────────────────────────────────
  function setMode(mode) {
    modeEl.textContent = mode;
    modeEl.className = "mode-badge mode-" + mode;
  }

  // ─── rebuildTarget — builds #target from stored peers + channels ─────────
  function rebuildTarget() {
    const current = targetEl.value;
    targetEl.innerHTML = '<option value="all">all (broadcast)</option>';
    for (const p of currentPeers) {
      const opt = document.createElement("option");
      opt.value = p; opt.textContent = p;
      targetEl.appendChild(opt);
    }
    for (const ch of Object.keys(channels)) {
      const opt = document.createElement("option");
      opt.value = ch; opt.textContent = `${ch} (channel)`;
      targetEl.appendChild(opt);
    }
    targetEl.value = [...targetEl.options].some(o => o.value === current) ? current : "all";
  }

  // ─── selectTarget — point the reply target at a peer / channel / "all" ────
  // Wired to clicks on names in the sidebar and in message meta lines. Only
  // switches when the value is an actual option (a live peer or channel), so a
  // click on a departed peer or a plain "all" badge is a harmless no-op.
  function selectTarget(value) {
    if (![...targetEl.options].some(o => o.value === value)) return;
    targetEl.value = value;
    // Mirror native <select> behaviour so any change listeners stay in sync.
    targetEl.dispatchEvent(new Event("change", { bubbles: true }));
  }

  // ─── makeTargetClickable — turn a name span into a target selector ────────
  function makeTargetClickable(el, value) {
    el.classList.add("pick-target");
    el.title = `Reply to ${value}`;
    el.onclick = () => selectTarget(value);
  }

  // ─── rebuildFilterBar — rebuilds #filter-select channel options ───────────
  function rebuildFilterBar() {
    const current = filterEl.value;
    // Remove any existing channel options (those starting with #)
    [...filterEl.options].forEach(o => { if (o.value.startsWith("#")) o.remove(); });
    for (const ch of Object.keys(channels)) {
      const opt = document.createElement("option");
      opt.value = ch; opt.textContent = ch;
      filterEl.appendChild(opt);
    }
    // Keep selection if still valid, else revert to "all"
    filterEl.value = [...filterEl.options].some(o => o.value === current) ? current : "all";
  }

  // ─── setPeers — stores peers, updates sidebar, rebuilds target ────────────
  function setPeers(peers) {
    currentPeers = peers;
    peersEl.innerHTML = "";
    if (!peers.length) {
      const e = document.createElement("div");
      e.className = "peer empty"; e.textContent = "— none —";
      peersEl.appendChild(e);
    }
    for (const p of peers) {
      const row = document.createElement("div");
      row.className = "peer";
      const dot = document.createElement("span"); dot.className = "dot"; dot.style.background = colorFor(p);
      const name = document.createElement("span"); name.textContent = p; name.style.color = colorFor(p);
      makeTargetClickable(name, p);
      const kick = document.createElement("button");
      kick.className = "peer-kick"; kick.textContent = "✕";
      kick.title = "Kick " + p; kick.onclick = () => kickPeer(p);
      row.append(dot, name, kick);
      peersEl.appendChild(row);
    }
    rebuildTarget();
  }

  // ─── setChannels — updates sidebar Channels section + target + filter ─────
  function setChannels(ch) {
    channels = ch || {};
    channelsEl.innerHTML = "";
    const names = Object.keys(channels);
    if (!names.length) {
      const e = document.createElement("div");
      e.className = "peer empty"; e.textContent = "— none —";
      channelsEl.appendChild(e);
    }
    for (const name of names) {
      const entry = channels[name] || {};
      const members = Array.isArray(entry.members) ? entry.members : [];
      const topic = entry.topic || null;
      const row = document.createElement("div");
      row.className = "channel-row";
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.textContent = name;
      nameSpan.style.color = colorFor(name);
      makeTargetClickable(nameSpan, name);
      const topicSpan = document.createElement("span");
      if (topic) {
        topicSpan.className = "channel-topic";
        topicSpan.textContent = topic;
      } else {
        topicSpan.className = "channel-topic empty";
        topicSpan.textContent = "— no topic —";
      }
      const membersSpan = document.createElement("span");
      membersSpan.className = "channel-members";
      membersSpan.textContent = members.length
        ? members.join(", ")
        : "no members";
      row.append(nameSpan, topicSpan, membersSpan);
      channelsEl.appendChild(row);
    }
    rebuildTarget();
    rebuildFilterBar();
  }

  // ─── clearFloor — operator override: force a talking stick closed ────────
  function clearFloor(scope) {
    if (!confirm('Force the talking stick for ' + scope + ' closed?')) return;
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ floor: { action: 'clear', scope } }));
  }

  // ─── setFloors — stores floor state and renders the talking-stick strip ──
  function setFloors(f) {
    floors = f || {};
    const strip = document.getElementById('floor-strip');
    strip.innerHTML = '';
    const scopes = Object.keys(floors);
    if (!scopes.length) {
      strip.classList.remove('active');
      return;
    }
    strip.classList.add('active');
    for (const scope of scopes) {
      const entry = floors[scope];
      const holder = entry.holder || '?';
      const scopeLabel = scope === 'all' ? 'ALL / whole room' : scope;
      const hands = Array.isArray(entry.hands) ? entry.hands : [];

      const row = document.createElement('div');
      row.className = 'floor-entry';

      const label = document.createElement('span');
      label.className = 'floor-label';
      label.textContent = '🪧 TALKING STICK';

      const holderSpan = document.createElement('span');
      holderSpan.className = 'floor-holder';
      holderSpan.textContent = holder;
      holderSpan.style.color = colorFor(holder);

      const scopeSpan = document.createElement('span');
      scopeSpan.className = 'floor-scope';
      scopeSpan.innerHTML = 'scope: <b>' + escapeHtml(scopeLabel) + '</b>';

      row.append(label, holderSpan, scopeSpan);

      if (entry.reason) {
        const reasonSpan = document.createElement('span');
        reasonSpan.className = 'floor-reason';
        reasonSpan.textContent = '"' + entry.reason + '"';
        row.append(reasonSpan);
      }

      const handsSpan = document.createElement('span');
      handsSpan.className = 'floor-hands';
      if (hands.length) {
        handsSpan.innerHTML = '✋ waiting: <b>' + hands.map(escapeHtml).join(', ') + '</b>';
      } else {
        handsSpan.textContent = 'no hands raised';
      }
      row.append(handsSpan);

      const clearBtn = document.createElement('button');
      clearBtn.className = 'floor-clear';
      clearBtn.textContent = 'CLEAR';
      clearBtn.title = 'Force talking stick for ' + scope + ' closed';
      clearBtn.onclick = () => clearFloor(scope);
      row.append(clearBtn);

      strip.appendChild(row);
    }
  }

  // ─── exportChat — download the server-side log transcript ────────────────
  // The /export endpoint streams an attachment (Content-Disposition sets the
  // filename), so a transient anchor click triggers a save without navigating.
  function exportChat() {
    const fmt = document.getElementById("export-format").value;
    const a = document.createElement("a");
    a.href = `/export?format=${encodeURIComponent(fmt)}`;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  // ─── kickPeer — evict a connected peer from the hub ──────────────────────
  function kickPeer(name) {
    if (!confirm('Kick "' + name + '" from the caucus?')) return;
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ kick: name }));
  }

  // ─── ctl / sendHuman — unchanged ─────────────────────────────────────────
  function ctl(action) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ action })); }

  function sendHuman() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ say: text, to: targetEl.value }));
    input.value = "";
  }

  document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendHuman(); }
  });

  // ─── filter change — re-render feed from allMessages ─────────────────────
  filterEl.addEventListener("change", renderFeed);

  // ═══════════════════════════════════════════════════════════════════════════
  // ─── FORMS — pending forms tray ──────────────────────────────────────────
  // ═══════════════════════════════════════════════════════════════════════════

  // addPendingForm — register a form and add its tray entry
  function addPendingForm(form) {
    if (pendingForms.has(form.id)) return; // idempotent
    pendingForms.set(form.id, form);
    renderFormsTray();
  }

  // removePendingForm — deregister form, close wizard if open for this form
  function removePendingForm(id) {
    if (!pendingForms.has(id)) return;
    pendingForms.delete(id);
    renderFormsTray();
    // If wizard is open for this form, close it silently (resolved externally)
    if (wizardState && wizardState.form.id === id) {
      closeWizard(/* sendCancel= */ false);
    }
  }

  // renderFormsTray — rebuild the forms-list DOM from pendingForms
  function renderFormsTray() {
    formsList.innerHTML = "";
    const count = pendingForms.size;
    formsCount.textContent = String(count);

    if (count === 0) {
      formsArea.classList.remove("has-forms");
      return;
    }
    formsArea.classList.add("has-forms");

    for (const form of pendingForms.values()) {
      const entry = document.createElement("div");
      entry.className = "form-entry";
      entry.dataset.formId = form.id;

      const meta = document.createElement("div");
      meta.className = "form-entry-meta";

      const titleEl = document.createElement("div");
      titleEl.className = "form-entry-title";
      titleEl.textContent = form.title;

      const subEl = document.createElement("div");
      subEl.className = "form-entry-sub";
      const fieldCount = Array.isArray(form.fields) ? form.fields.length : 0;
      subEl.textContent = `from ${form.asker}  ·  to ${form.to}  ·  ${fieldCount} field${fieldCount !== 1 ? "s" : ""}`;

      meta.append(titleEl, subEl);

      const actions = document.createElement("div");
      actions.className = "form-entry-actions";

      const answerBtn = document.createElement("button");
      answerBtn.className = "btn-answer";
      answerBtn.textContent = "Answer";
      answerBtn.onclick = () => openWizard(form.id);

      const dismissBtn = document.createElement("button");
      dismissBtn.className = "btn-dismiss";
      dismissBtn.textContent = "✕";
      dismissBtn.title = "Cancel / dismiss this form";
      dismissBtn.onclick = () => cancelForm(form.id);

      actions.append(answerBtn, dismissBtn);
      entry.append(meta, actions);
      formsList.appendChild(entry);
    }
  }

  // cancelForm — send cancel_form WS message and remove from tray
  function cancelForm(id) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ cancel_form: id }));
    removePendingForm(id);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ─── WIZARD — one card per field + recap ─────────────────────────────────
  // ═══════════════════════════════════════════════════════════════════════════

  function openWizard(formId) {
    const form = pendingForms.get(formId);
    if (!form) return;
    wizardState = { form, step: 0, answers: {} };
    wizardBackdrop.classList.add("open");
    document.getElementById("wizard-title-text").textContent = form.title;
    document.getElementById("wizard-sub-text").textContent =
      `from ${form.asker}  ·  to ${form.to}  ·  ${fmtTime(form.ts)}`;
    renderWizardStep();
    // Focus the modal for keyboard nav
    wizardBackdrop.focus();
  }

  // closeWizard — hide modal; optionally send cancel message
  function closeWizard(sendCancel = true) {
    if (!wizardState) return;
    const id = wizardState.form.id;
    wizardState = null;
    wizardBackdrop.classList.remove("open");
    wizardBody.innerHTML = "";
    wizardFoot.innerHTML = "";
    if (sendCancel) cancelForm(id);
  }

  // totalSteps = fields.length + 1 (recap)
  function totalSteps(form) {
    return (Array.isArray(form.fields) ? form.fields.length : 0) + 1;
  }

  // renderWizardStep — render either a field card or the recap card
  function renderWizardStep() {
    const { form, step } = wizardState;
    const fields = Array.isArray(form.fields) ? form.fields : [];
    const total = totalSteps(form);
    const isRecap = step >= fields.length;

    // Progress bar
    const pct = isRecap ? 100 : Math.round((step / total) * 100);
    document.getElementById("wizard-progress-fill").style.width = pct + "%";
    document.getElementById("wizard-progress-label").textContent = isRecap
      ? "Review"
      : `Step ${step + 1} / ${total}`;

    wizardBody.innerHTML = "";
    wizardFoot.innerHTML = "";

    if (isRecap) {
      renderRecapCard(fields);
    } else {
      renderFieldCard(fields[step]);
    }
  }

  // ─── renderFieldCard — single field step ─────────────────────────────────
  function renderFieldCard(field) {
    const { answers } = wizardState;
    wizardBody.innerHTML = "";

    // Label + required marker
    const labelRow = document.createElement("div");
    labelRow.className = "wizard-field-label";
    const labelText = document.createElement("span");
    labelText.textContent = field.label;
    labelRow.appendChild(labelText);
    if (field.required) {
      const req = document.createElement("span");
      req.className = "wizard-required";
      req.textContent = "required";
      labelRow.appendChild(req);
    }
    wizardBody.appendChild(labelRow);

    // Field control
    let getValueFn; // () => value | null (null = validation fail)
    let focusFn = () => {};

    if (field.type === "radio") {
      getValueFn = renderRadioField(wizardBody, field, answers[field.key]);
    } else if (field.type === "checkbox") {
      getValueFn = renderCheckboxField(wizardBody, field, answers[field.key]);
    } else if (field.type === "text") {
      const { getValue, focus } = renderTextField(wizardBody, field, answers[field.key]);
      getValueFn = getValue; focusFn = focus;
    } else if (field.type === "textarea") {
      const { getValue, focus } = renderTextareaField(wizardBody, field, answers[field.key]);
      getValueFn = getValue; focusFn = focus;
    } else {
      // Unknown type — treat as text
      const { getValue, focus } = renderTextField(wizardBody, field, answers[field.key]);
      getValueFn = getValue; focusFn = focus;
    }

    // Validation error slot
    const errEl = document.createElement("div");
    errEl.className = "wizard-error";
    errEl.id = "wizard-field-error";
    wizardBody.appendChild(errEl);

    // Footer
    renderWizardFooter({
      onBack: wizardState.step > 0 ? () => { wizardState.step--; renderWizardStep(); } : null,
      onNext: () => {
        const val = getValueFn();
        const err = validateFieldValue(field, val);
        if (err) {
          errEl.textContent = err;
          errEl.classList.add("visible");
          return;
        }
        errEl.classList.remove("visible");
        wizardState.answers[field.key] = val;
        wizardState.step++;
        renderWizardStep();
      },
      isRecap: false,
    });

    // Autofocus (cheap UX win — defer so DOM is ready)
    requestAnimationFrame(focusFn);
  }

  // ─── validateFieldValue ───────────────────────────────────────────────────
  function validateFieldValue(field, val) {
    if (!field.required) return null;
    if (field.type === "checkbox") {
      if (!Array.isArray(val) || val.length === 0) return "Please select at least one option.";
    } else if (field.type === "radio") {
      if (!val || String(val).trim() === "") return "Please select an option.";
    } else {
      if (!val || String(val).trim() === "") return "This field is required.";
    }
    return null;
  }

  // ─── renderRadioField — returns getValueFn ────────────────────────────────
  function renderRadioField(container, field, currentVal) {
    const opts = Array.isArray(field.options) ? [...field.options] : [];
    const hasOther = field.allow_other === true;
    const optionsEl = document.createElement("div");
    optionsEl.className = "wizard-options";

    // Track which label wraps "Other" and the associated input
    let otherInput = null;
    let otherWrapper = null;

    const name = "wiz_radio_" + field.key + "_" + Date.now();

    for (const opt of opts) {
      const label = document.createElement("label");
      label.className = "wizard-option";
      const inp = document.createElement("input");
      inp.type = "radio"; inp.name = name; inp.value = opt;
      if (currentVal === opt) { inp.checked = true; label.classList.add("selected"); }
      const txt = document.createElement("span");
      txt.className = "wizard-option-text"; txt.textContent = opt;

      inp.addEventListener("change", () => {
        optionsEl.querySelectorAll(".wizard-option").forEach(l => l.classList.remove("selected"));
        label.classList.add("selected");
        if (otherWrapper) otherWrapper.classList.remove("visible");
      });

      label.append(inp, txt);
      optionsEl.appendChild(label);
    }

    if (hasOther) {
      const otherLabel = document.createElement("label");
      otherLabel.className = "wizard-option";
      const otherInp = document.createElement("input");
      otherInp.type = "radio"; otherInp.name = name; otherInp.value = "__other__";
      const txt = document.createElement("span");
      txt.className = "wizard-option-text"; txt.textContent = "Other…";

      otherWrapper = document.createElement("div");
      otherWrapper.className = "wizard-other-input";
      otherInput = document.createElement("input");
      otherInput.type = "text"; otherInput.placeholder = "Please specify…";

      // If currentVal is set and doesn't match any known option, it's "other"
      const isCurrentOther = currentVal && !opts.includes(currentVal);
      if (isCurrentOther) {
        otherInp.checked = true; otherLabel.classList.add("selected");
        otherWrapper.classList.add("visible");
        otherInput.value = currentVal;
      }

      otherInp.addEventListener("change", () => {
        optionsEl.querySelectorAll(".wizard-option").forEach(l => l.classList.remove("selected"));
        otherLabel.classList.add("selected");
        otherWrapper.classList.add("visible");
        requestAnimationFrame(() => otherInput.focus());
      });

      otherWrapper.appendChild(otherInput);
      otherLabel.append(otherInp, txt);
      optionsEl.appendChild(otherLabel);
      optionsEl.appendChild(otherWrapper);
    }

    container.appendChild(optionsEl);

    return () => {
      const checked = optionsEl.querySelector("input[type=radio]:checked");
      if (!checked) return field.required ? null : "";
      if (checked.value === "__other__") {
        return (otherInput ? otherInput.value.trim() : "") || (field.required ? null : "");
      }
      return checked.value;
    };
  }

  // ─── renderCheckboxField — returns getValueFn ─────────────────────────────
  function renderCheckboxField(container, field, currentVal) {
    const opts = Array.isArray(field.options) ? [...field.options] : [];
    const hasOther = field.allow_other === true;
    const currentArr = Array.isArray(currentVal) ? currentVal : [];
    const optionsEl = document.createElement("div");
    optionsEl.className = "wizard-options";

    let otherInput = null;
    let otherWrapper = null;

    for (const opt of opts) {
      const label = document.createElement("label");
      label.className = "wizard-option";
      const inp = document.createElement("input");
      inp.type = "checkbox"; inp.value = opt;
      if (currentArr.includes(opt)) { inp.checked = true; label.classList.add("selected"); }
      const txt = document.createElement("span");
      txt.className = "wizard-option-text"; txt.textContent = opt;

      inp.addEventListener("change", () => {
        label.classList.toggle("selected", inp.checked);
      });

      label.append(inp, txt);
      optionsEl.appendChild(label);
    }

    if (hasOther) {
      const otherLabel = document.createElement("label");
      otherLabel.className = "wizard-option";
      const otherCb = document.createElement("input");
      otherCb.type = "checkbox"; otherCb.value = "__other__";
      const txt = document.createElement("span");
      txt.className = "wizard-option-text"; txt.textContent = "Other…";

      otherWrapper = document.createElement("div");
      otherWrapper.className = "wizard-other-input";
      otherInput = document.createElement("input");
      otherInput.type = "text"; otherInput.placeholder = "Please specify…";

      // Detect if current answers contain an "other" value (not in known opts)
      const currentOther = currentArr.find(v => !opts.includes(v));
      if (currentOther) {
        otherCb.checked = true; otherLabel.classList.add("selected");
        otherWrapper.classList.add("visible");
        otherInput.value = currentOther;
      }

      otherCb.addEventListener("change", () => {
        otherLabel.classList.toggle("selected", otherCb.checked);
        otherWrapper.classList.toggle("visible", otherCb.checked);
        if (otherCb.checked) requestAnimationFrame(() => otherInput.focus());
      });

      otherWrapper.appendChild(otherInput);
      otherLabel.append(otherCb, txt);
      optionsEl.appendChild(otherLabel);
      optionsEl.appendChild(otherWrapper);
    }

    container.appendChild(optionsEl);

    return () => {
      const chosen = [];
      optionsEl.querySelectorAll("input[type=checkbox]").forEach(cb => {
        if (!cb.checked) return;
        if (cb.value === "__other__") {
          const v = otherInput ? otherInput.value.trim() : "";
          if (v) chosen.push(v);
          // If "Other" checked but no text, field.required check handles it
        } else {
          chosen.push(cb.value);
        }
      });
      return chosen;
    };
  }

  // ─── renderTextField — returns { getValue, focus } ────────────────────────
  function renderTextField(container, field, currentVal) {
    const inp = document.createElement("input");
    inp.type = "text"; inp.className = "wizard-text-input";
    inp.placeholder = field.label || "";
    inp.value = currentVal || "";
    container.appendChild(inp);
    return {
      getValue: () => inp.value.trim() || (field.required ? null : ""),
      focus: () => inp.focus(),
    };
  }

  // ─── renderTextareaField — returns { getValue, focus } ────────────────────
  function renderTextareaField(container, field, currentVal) {
    const ta = document.createElement("textarea");
    ta.className = "wizard-textarea-input";
    ta.placeholder = field.label || "";
    ta.value = currentVal || "";
    container.appendChild(ta);
    return {
      getValue: () => ta.value.trim() || (field.required ? null : ""),
      focus: () => ta.focus(),
    };
  }

  // ─── renderRecapCard — final summary before submit ────────────────────────
  function renderRecapCard(fields) {
    const { answers } = wizardState;

    const recapList = document.createElement("div");
    recapList.className = "recap-list";

    for (const field of fields) {
      const item = document.createElement("div");
      item.className = "recap-item";

      const lbl = document.createElement("div");
      lbl.className = "recap-item-label";
      lbl.textContent = field.label;

      const val = answers[field.key];
      const valEl = document.createElement("div");
      const displayStr = formatAnswerForRecap(val);
      if (displayStr === "") {
        valEl.className = "recap-item-value empty";
        valEl.textContent = "(no answer)";
      } else {
        valEl.className = "recap-item-value";
        valEl.textContent = displayStr;
      }

      item.append(lbl, valEl);
      recapList.appendChild(item);
    }

    wizardBody.appendChild(recapList);

    // Footer for recap
    renderWizardFooter({
      onBack: () => { wizardState.step--; renderWizardStep(); },
      onNext: null,
      isRecap: true,
    });
  }

  function formatAnswerForRecap(val) {
    if (val === undefined || val === null) return "";
    if (Array.isArray(val)) return val.length ? val.join(", ") : "";
    return String(val);
  }

  // ─── renderWizardFooter — shared footer renderer ──────────────────────────
  function renderWizardFooter({ onBack, onNext, isRecap }) {
    wizardFoot.innerHTML = "";

    // Cancel always on left
    const cancelBtn = document.createElement("button");
    cancelBtn.className = "btn-wiz-cancel";
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = () => closeWizard(/* sendCancel= */ true);

    const spacer = document.createElement("div");
    spacer.className = "spacer";

    wizardFoot.append(cancelBtn, spacer);

    if (onBack) {
      const backBtn = document.createElement("button");
      backBtn.className = "btn-wiz-back";
      backBtn.textContent = "← Back";
      backBtn.onclick = onBack;
      wizardFoot.appendChild(backBtn);
    }

    if (isRecap) {
      const submitBtn = document.createElement("button");
      submitBtn.className = "btn-wiz-submit";
      submitBtn.textContent = "Submit";
      submitBtn.onclick = submitForm;
      wizardFoot.appendChild(submitBtn);
    } else if (onNext) {
      const nextBtn = document.createElement("button");
      nextBtn.className = "btn-wiz-next";
      nextBtn.textContent = "Next →";
      nextBtn.onclick = onNext;
      wizardFoot.appendChild(nextBtn);
    }
  }

  // ─── submitForm — build answers payload and send ──────────────────────────
  function submitForm() {
    if (!wizardState) return;
    const { form, answers } = wizardState;

    // Build the answers object: omit fields with empty/null values
    const payload = {};
    for (const field of (form.fields || [])) {
      const val = answers[field.key];
      if (val === undefined || val === null) continue;
      if (Array.isArray(val) && val.length === 0) continue;
      if (val === "") continue;
      payload[field.key] = val;
    }

    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ answer: { id: form.id, answers: payload } }));
    }

    const id = form.id;
    wizardState = null;
    wizardBackdrop.classList.remove("open");
    wizardBody.innerHTML = "";
    wizardFoot.innerHTML = "";
    // Remove from tray (server will also send form_resolved, but be optimistic)
    removePendingForm(id);
  }

  // ─── Keyboard shortcuts on wizard backdrop ────────────────────────────────
  wizardBackdrop.setAttribute("tabindex", "-1");
  wizardBackdrop.addEventListener("keydown", (e) => {
    if (!wizardBackdrop.classList.contains("open")) return;
    if (e.key === "Escape") {
      e.preventDefault();
      closeWizard(/* sendCancel= */ true);
    }
    // Enter on recap submits; Enter on a field step advances (if not in textarea)
    if (e.key === "Enter" && !e.shiftKey) {
      if (!wizardState) return;
      const form = wizardState.form;
      const fields = Array.isArray(form.fields) ? form.fields : [];
      const isRecap = wizardState.step >= fields.length;
      if (isRecap) {
        e.preventDefault();
        submitForm();
      } else {
        // Don't intercept Enter in textarea — that should insert newline
        if (e.target && e.target.tagName === "TEXTAREA") return;
        // Click the Next button
        const nextBtn = wizardFoot.querySelector(".btn-wiz-next");
        if (nextBtn) { e.preventDefault(); nextBtn.click(); }
      }
    }
  });

  // Click backdrop (outside the wizard card) → cancel
  wizardBackdrop.addEventListener("click", (e) => {
    if (e.target === wizardBackdrop) closeWizard(/* sendCancel= */ true);
  });

  // ═══════════════════════════════════════════════════════════════════════════
  // ─── connect — WebSocket event contract extended for forms ────────────────
  // ═══════════════════════════════════════════════════════════════════════════
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ui`);
    ws.onopen = () => { connEl.textContent = "● live"; connEl.className = "conn live"; };
    ws.onclose = () => {
      connEl.textContent = "● disconnected"; connEl.className = "conn dead";
      setTimeout(connect, 1500);
    };
    ws.onmessage = (ev) => {
      const e = JSON.parse(ev.data);
      if (e.type === "snapshot") {
        allMessages = [];
        setMode(e.mode);
        setPeers(e.peers);
        setChannels(e.channels || {});
        setFloors(e.floors || {});
        feed.innerHTML = "";
        (e.log || []).forEach(addMessage);
        // Restore pending forms from snapshot
        pendingForms.clear();
        for (const form of (e.forms || [])) {
          if (form.status === "pending") pendingForms.set(form.id, form);
        }
        renderFormsTray();
      } else if (e.type === "message") {
        addMessage(e.message);
      } else if (e.type === "mode") {
        setMode(e.mode);
      } else if (e.type === "peers") {
        setPeers(e.peers);
      } else if (e.type === "channels") {
        setChannels(e.channels || {});
      } else if (e.type === "floor") {
        setFloors(e.floors || {});
      } else if (e.type === "form") {
        // New pending form pushed by the hub
        if (e.form && e.form.status === "pending") addPendingForm(e.form);
      } else if (e.type === "form_resolved") {
        // Form answered or cancelled by any means
        removePendingForm(e.id);
      }
    };
  }
  connect();

  // ─── Non-blocking Google Fonts injection ──────────────────────────────────
  // Injected AFTER window.onload so a hanging CDN can never delay that event.
  // The page renders immediately on fallback fonts (Georgia/monospace per CSS
  // variables); webfonts swap in when/if the CDN responds.
  window.addEventListener("load", () => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap";
    document.head.appendChild(link);
  });
</script>
</body>
</html>
